<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check In/Out</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-image: url('/static/ice.jpg');
            background-size: cover;
            background-position: center;
        }

        form {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.15);
            max-width: 450px;
            width: 100%;
        }

        .flash-container {
            margin-bottom: 12px;
        }

        .flash {
            background-color: #dff0d8;
            color: #3c763d;
            padding: 12px;
            border-radius: 5px;
            text-align: center;
        }

        .flash.error {
            background-color: #f2dede;
            color: #a94442;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 6px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .btn-container {
            display: flex;
            justify-content: space-between;
        }

        button {
            width: 48%;
            background-color: #28a745;
            color: #fff;
            cursor: pointer;
            padding: 14px 0;
            border: none;
            border-radius: 4px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #218838;
        }

        .links {
            margin-top: 20px;
            text-align: center;
        }

        .links a {
            color: #007bff;
            text-decoration: none;
            font-size: 16px;
        }

        .links a:hover {
            text-decoration: underline;
        }

        footer {
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<h2>Check-In or Check-Out Equipment</h2>

{% with messages = get_flashed_messages(with_categories=True) %}
  {% if messages %}
    <div class="flash-container">
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<form action="/checkinout" method="post">
    <label for="name">Student Name:</label>
    <input type="text" id="name" name="name" placeholder="Enter your name" required>

    <label for="numberid">Student ID:</label>
    <input type="text" id="numberid" name="studentid" placeholder="Enter your student ID" required>

    <label for="equipment">Equipment:</label>
    <textarea id="equipment" name="equipment" rows="3" placeholder="Enter equipment name" required></textarea>

    <div class="btn-container">
        <button type="submit" name="action" value="checkin">Check In</button>
        <button type="submit" name="action" value="checkout">Check Out</button>
    </div>
</form>

<!-- Link to View Available Equipment -->
<div class="links">
    <a href="/equipment?filter=available">View Available Equipment</a>
    <br>
    <a href="/action-log">View Action Log</a>
</div>

<footer>
    USU Check-In/Out Application
</footer>

</body>
</html>
