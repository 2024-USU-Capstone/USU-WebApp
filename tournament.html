<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Page</title>
    <style>
        body {
            font-family: Arial, sans-serif; margin: 20px; padding: 20px;
            background: url("{{ url_for('static', filename='images/to.png') }}") center top / contain no-repeat, #001f3f;
            color: #fff;
        }
        h1, #countdown { text-align: center; color: #00aaff; }
        h3 { margin-top: 30px; border-bottom: 2px solid #00aaff; padding-bottom: 5px; }
        form { margin-bottom: 20px; background: rgba(0, 0, 50, 0.7); padding: 20px; border-radius: 8px; }
        input, textarea, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; }
        button { background: #00aaff; color: #000; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #0088cc; }
        ul { list-style: none; padding: 0; }
        li { background: rgba(0, 150, 255, 0.7); margin: 5px 0; padding: 10px; border-radius: 5px; display: flex; justify-content: space-between; }
        li button { background: #ff3333; color: white; border: none; padding: 5px 10px; cursor: pointer; }
        li button:hover { background: #cc0000; }
        #logo { position: fixed; bottom: 10px; right: 10px; width: 100px; opacity: 0.95; background: rgba(255, 255, 255, 0.8); padding: 5px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3); }
    </style>
</head>
<body>

    <h1>Welcome to the Tournament!</h1>
    <h3>Time until next tournament:</h3>
    <div id="countdown">No upcoming tournaments!</div>

    <h3>Register for the Tournament</h3>
    <form id="registrationForm">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <input type="text" placeholder="Tournament Name" required>
        <button type="submit">Register</button>
    </form>

    <h3>Participants List</h3>
    <ul id="participantList"></ul>

    <h3>Manage Tournaments</h3>
    <form id="tournamentForm">
        <input type="text" placeholder="Tournament Name" required>
        <input type="datetime-local" required>
        <input type="text" placeholder="Location" required>
        <button type="submit">Add Tournament</button>
    </form>

    <ul id="tournamentList"></ul>

    <h3>Feedback</h3>
    <form id="feedbackForm">
        <textarea placeholder="Leave your feedback here..." required></textarea>
        <button type="submit">Submit Feedback</button>
    </form>

    <img src="{{ url_for('static', filename='images/USU_Logo.png') }}" alt="USU Logo" id="logo">

    <script>
        const upcomingTournaments = [];

        const updateCountdown = () => {
            const tournament = upcomingTournaments.sort((a, b) => new Date(a.date) - new Date(b.date))[0];
            const countdownElem = document.getElementById("countdown");

            if (tournament) {
                const distance = new Date(tournament.date) - new Date();
                const time = [
                    Math.floor(distance / (1000 * 60 * 60 * 24)) + "d",
                    Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)) + "h",
                    Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)) + "m",
                    Math.floor((distance % (1000 * 60)) / 1000) + "s"
                ].join(" ");
                countdownElem.textContent = distance < 0 ? "Tournament Started!" : time;
            }
        };

        const addElement = (listId, text, buttonText, callback) => {
            const li = document.createElement('li');
            li.innerHTML = `${text} <button>${buttonText}</button>`;
            li.querySelector('button').addEventListener('click', callback);
            document.getElementById(listId).appendChild(li);
        };

        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = this[0].value, tournament = this[2].value;
            addElement('participantList', `${name} - ${tournament}`, 'Remove', e => e.target.parentElement.remove());
            alert(`Thank you for registering, ${name}, for the ${tournament} tournament!`);
            this.reset();
        });

        document.getElementById('tournamentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = this[0].value, date = this[1].value, location = this[2].value;
            upcomingTournaments.push({ name, date, location });
            addElement('tournamentList', `${name} - ${new Date(date).toLocaleString()} @ ${location}`, 'Delete', e => {
                upcomingTournaments.splice(upcomingTournaments.findIndex(t => t.name === name), 1);
                e.target.parentElement.remove();
                updateCountdown();
            });
            this.reset();
            updateCountdown();
        });

        document.getElementById('feedbackForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Thank you for your feedback!");
            this.reset();
        });

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
